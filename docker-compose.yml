# ─── Sequent — Docker Compose ────────────────────────────────────────────────
# Comic reader with CBR, CBZ, and PDF support.
#
# Usage:
#   docker compose up -d          # start
#   docker compose logs -f        # follow logs
#
# Single data volume holds everything persistent:
#   ./data → /data   (comics.db, covers cache, page cache, localcvdb)
#   ./comics → /comics:ro  (your comic files)
# ──────────────────────────────────────────────────────────────────────────────

services:
  sequent:
    image: ${SEQUENT_IMAGE:-ghcr.io/jo3l/sequent:latest}
    container_name: sequent
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ${COMICS_DIR:-./comics}:/app/comics:ro
    devices:
      - /dev/dri:/dev/dri  # GPU passthrough for AI upscaling (upscayl-ncnn)
    environment:
      NITRO_JWT_SECRET: ${JWT_SECRET:-}
      COMIC_VINE_API_KEY: ${COMIC_VINE_API_KEY:-}
      DATA_DIR: /data
      LOCALCVDB_PATH: ${LOCALCVDB_PATH:-/data/localcvdb/localcv.db}
